name: Visual regression

# Verifies the docs pages against the committed visual baselines. Rendering runs
# inside the pinned Playwright container so results match the baselines regardless
# of where CI (or a contributor) sits. To accept intended visual changes, run the
# "Regenerate visual baselines" workflow and commit the produced artifact.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  visual:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --ipc=host
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx playwright test tests/visual
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
